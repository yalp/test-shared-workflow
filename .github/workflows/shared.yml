name: Dispatch Promote

on:
  workflow_call:
    inputs:
      version:
        description: "Release to promote"
        type: string
        required: true
    secrets:
      DISPATCH_TOKEN:
        required: true
      
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch test
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh workflow run on-app-update.yaml \
            --repo "yalp/test-dispatch" \
            --ref main \
            --field app_repo="${{ github.repository }}" \
